openapi: 3.1.0
info:
  title: Pharos Local API
  version: 0.0.3
  description: Unreleased v0.3 local API. The daemon, bundled Swift client, and CLI are upgraded in lockstep.
servers:
  - url: http://127.0.0.1:8765
paths:
  /health:
    get:
      operationId: health
      responses:
        '200':
          description: OK
  /v0/capture:
    post:
      operationId: capture
      security:
        - CapabilityBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureRequest'
      responses:
        '200':
          description: Created request
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v0/source-signals:
    post:
      operationId: ingestSourceSignal
      security:
        - CapabilityBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourceSignalRequest'
      responses:
        '200':
          description: Source signal ingested or merged into an active request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceSignalResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v0/sources:
    get:
      operationId: listSources
      security:
        - CapabilityBearer: []
      responses:
        '200':
          description: Persistent source settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourcesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v0/sources/{id}:
    patch:
      operationId: patchSource
      security:
        - CapabilityBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourcePatchRequest'
      responses:
        '200':
          description: Updated source settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceResponse'
        '400':
          description: Invalid request field or invalid_source_scope; the source row is unchanged.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Source not found.
  /v0/today:
    get:
      operationId: today
      security:
        - CapabilityBearer: []
      responses:
        '200':
          description: User-facing Today snapshot grouped by attention needs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodaySnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v0/debug/today-internal:
    get:
      operationId: todayInternalDebug
      description: Optional debug route. SwiftUI must not use this route.
      security:
        - CapabilityBearer: []
      responses:
        '200':
          description: Internal lifecycle-bucket snapshot.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v0/requests/{id}:
    get:
      operationId: getRequest
      security:
        - CapabilityBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v0/actions/{id}/approve:
    post:
      operationId: approveAction
      security:
        - CapabilityBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionReviewRequest'
      responses:
        '200':
          description: Approval created
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/StaleAction'
  /v0/actions/{id}/edit-and-approve:
    post:
      operationId: editAndApproveAction
      security:
        - CapabilityBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body, expected_payload_hash]
              properties:
                body:
                  type: string
                expected_payload_hash:
                  type: string
                  description: Opaque action revision returned by the API. Current v0.3 actions use sha256 followed by 64 lowercase hexadecimal characters; clients must echo the value without recomputing it.
                  example: sha256:6f61c67b639f2adab56d4cec560d4a18fbf805531cebdc6fd8f74d0cce6e46f4
      responses:
        '200':
          description: Edited approval created
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/StaleAction'
  /v0/actions/{id}/reject:
    post:
      operationId: rejectAction
      security:
        - CapabilityBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionReviewRequest'
      responses:
        '200':
          description: Rejected
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/StaleAction'
  /v0/actions/{id}/execute-local:
    post:
      operationId: executeLocalAction
      security:
        - CapabilityBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Executed local action
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v0/actions/{id}/execute-approved:
    post:
      operationId: executeApprovedAction
      description: Runs policy preflight, persists an attempt, and delivers an approved GitLab MR or issue comment outside the SQLite transaction and Dream event loop.
      security:
        - CapabilityBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Durable attempt finalized as confirmed, failed_before_send, or unknown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WritebackAttemptResponse'
        '400':
          description: Policy preflight failed before GitLab transport.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: An active attempt already exists or the action state changed.
  /v0/writeback-attempts/{id}/reconcile:
    post:
      operationId: reconcileWritebackAttempt
      description: Checks bounded GitLab Notes pages for the exact marker of an unknown attempt; it never issues a second comment POST.
      security:
        - CapabilityBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reconciliation result. Marker absence leaves the attempt unknown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WritebackAttemptResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Writeback attempt not found.
        '409':
          description: The attempt is not in unknown state.
  /v0/writeback-attempts/{id}/abandon:
    post:
      operationId: abandonWritebackAttempt
      description: Explicitly abandons an unknown attempt and returns its action to proposed for fresh review and approval.
      security:
        - CapabilityBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Attempt abandoned; no GitLab request was made.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WritebackAttemptResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Writeback attempt not found.
        '409':
          description: The attempt is not in unknown state.
components:
  securitySchemes:
    CapabilityBearer:
      type: http
      scheme: bearer
      description: Runtime-only 64-character lowercase hexadecimal capability configured by PHAROS_CAPABILITY_TOKEN.
  responses:
    Unauthorized:
      description: Missing or invalid caller capability.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
    StaleAction:
      description: The reviewed action hash or status is no longer current.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StaleActionError'
  schemas:
    UnauthorizedError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          const: unauthorized
    StaleActionError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          const: stale_action
    ActionReviewRequest:
      type: object
      required: [expected_payload_hash]
      properties:
        expected_payload_hash:
          type: string
          description: Opaque action revision returned by the API. Current v0.3 actions use sha256 followed by 64 lowercase hexadecimal characters; clients must echo the value without recomputing it.
          example: sha256:6f61c67b639f2adab56d4cec560d4a18fbf805531cebdc6fd8f74d0cce6e46f4
    ProposedAction:
      type: object
      required: [id, request_id, title, body, target_kind, target_ref, risk, requires_approval, status, payload_hash, created_at, updated_at]
      properties:
        id:
          type: string
        request_id:
          type: string
        title:
          type: string
        body:
          type: string
        target_kind:
          type: string
        target_ref:
          type: string
        risk:
          type: string
          enum: [l0, l1, l2, l3, l4, l5]
        requires_approval:
          type: boolean
        status:
          type: string
          enum: [proposed, approved, executing, executed, rejected, failed]
        payload_hash:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        created_at:
          type: string
        updated_at:
          type: string
    WritebackStatus:
      type: string
      enum: [prepared, in_flight, confirmed, unknown, failed_before_send, abandoned]
    WritebackAttempt:
      type: object
      required: [id, action_id, approval_id, payload_hash, target_kind, target_ref, marker, status, external_id, external_url, error, created_at, updated_at, started_at, finished_at]
      properties:
        id:
          type: string
        action_id:
          type: string
        approval_id:
          type: string
        payload_hash:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        target_kind:
          type: string
          enum: [gitlab.mr.comment, gitlab.issue.comment]
        target_ref:
          type: string
        marker:
          type: string
        status:
          $ref: '#/components/schemas/WritebackStatus'
        external_id:
          type: [string, 'null']
        external_url:
          type: [string, 'null']
        error:
          type: [string, 'null']
        created_at:
          type: string
        updated_at:
          type: string
        started_at:
          type: [string, 'null']
        finished_at:
          type: [string, 'null']
    WritebackAttemptResponse:
      type: object
      required: [action, attempt]
      properties:
        action:
          $ref: '#/components/schemas/ProposedAction'
        attempt:
          $ref: '#/components/schemas/WritebackAttempt'
    RequestDetail:
      type: object
      required: [request, actions, writeback_attempts, evidence, timeline]
      properties:
        request:
          $ref: '#/components/schemas/WorkRequest'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ProposedAction'
        writeback_attempts:
          type: array
          items:
            $ref: '#/components/schemas/WritebackAttempt'
        evidence:
          type: array
          items:
            type: object
        timeline:
          type: array
          items:
            type: object
    AttentionGroup:
      type: string
      enum:
        - needs_decision
        - needs_input
        - watching
        - handled
        - noise
    CaptureRequest:
      type: object
      required: [body]
      properties:
        title:
          type: string
        body:
          type: string
        url:
          type: string
        actor:
          type: string
    SourceSignalRequest:
      type: object
      required:
        - kind
        - actor
        - title
        - body
        - occurred_at
      properties:
        kind:
          type: string
          enum: [manual, feishu_chat, feishu_project, gitlab, feishu_docs]
        external_id:
          type:
            - string
            - 'null'
        actor:
          type: string
        title:
          type: string
        body:
          type: string
        url:
          type:
            - string
            - 'null'
        occurred_at:
          type: string
        raw_json:
          oneOf:
            - type: string
            - type: object
            - type: 'null'
    SourceSignalResponse:
      type: object
      required:
        - request
        - merged
        - detail_url
      properties:
        request:
          $ref: '#/components/schemas/RequestRef'
        merged:
          type: boolean
        detail_url:
          type: string
    RequestRef:
      type: object
      required:
        - id
      properties:
        id:
          type: string
    SourceConfig:
      type: object
      required:
        - id
        - kind
        - enabled
        - read_enabled
        - write_enabled
        - scope_json
        - last_sync_at
        - last_error
        - created_at
        - updated_at
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [feishu_chat, feishu_project, gitlab, feishu_docs]
        enabled:
          type: boolean
        read_enabled:
          type: boolean
        write_enabled:
          type: boolean
        scope_json:
          type: string
          description: Persisted operational scope. GitLab accepts only {} or a projects array of positive integer IDs; other source kinds accept only {}.
        last_sync_at:
          type:
            - string
            - 'null'
        last_error:
          type:
            - string
            - 'null'
        created_at:
          type: string
        updated_at:
          type: string
    SourcesResponse:
      type: object
      required:
        - sources
      properties:
        sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceConfig'
    SourceResponse:
      type: object
      required:
        - source
      properties:
        source:
          $ref: '#/components/schemas/SourceConfig'
    SourcePatchRequest:
      type: object
      properties:
        enabled:
          type: boolean
        read_enabled:
          type: boolean
        write_enabled:
          type: boolean
        scope_json:
          type: string
          description: Optional replacement scope. Omission preserves the stored value; valid input is canonicalized and invalid input returns invalid_source_scope without a write.
    WorkRequest:
      type: object
      required:
        - id
        - title
        - summary
        - status
        - priority
        - risk
        - source_kind
        - source_signal_id
        - reason
        - next_step
        - created_at
        - updated_at
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        status:
          type: string
        priority:
          type: string
        risk:
          type: string
        source_kind:
          type: string
        source_signal_id:
          type: string
        reason:
          type: string
        next_step:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    TodaySnapshot:
      type: object
      required:
        - needs_decision
        - needs_input
        - watching
        - handled
        - noise
      properties:
        needs_decision:
          type: array
          items:
            $ref: '#/components/schemas/DecisionCard'
        needs_input:
          type: array
          items:
            $ref: '#/components/schemas/DecisionCard'
        watching:
          type: array
          items:
            $ref: '#/components/schemas/DecisionCard'
        handled:
          type: array
          items:
            $ref: '#/components/schemas/DecisionCard'
        noise:
          $ref: '#/components/schemas/NoiseSummary'
    NoiseSummary:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
          minimum: 0
    DecisionCard:
      type: object
      required:
        - request_id
        - title
        - summary
        - group
        - source_kind
        - source_url
        - priority
        - risk
        - why_now
        - prepared_next_move
        - target_preview
        - evidence_count
        - updated_at
        - debug_status
      properties:
        request_id:
          type: string
        title:
          type: string
        summary:
          type: string
        group:
          $ref: '#/components/schemas/AttentionGroup'
        source_kind:
          type: string
        source_url:
          type:
            - string
            - 'null'
        priority:
          type: string
          enum: [low, normal, high, urgent]
        risk:
          type: string
          enum: [l0, l1, l2, l3, l4, l5]
        why_now:
          type: string
        prepared_next_move:
          type:
            - string
            - 'null'
        target_preview:
          type:
            - string
            - 'null'
        evidence_count:
          type: integer
          minimum: 0
        updated_at:
          type: string
        debug_status:
          type: string
