openapi: 3.1.0
info:
  title: Pharos Local API
  version: 0.0.3
servers:
  - url: http://127.0.0.1:8765
paths:
  /health:
    get:
      operationId: health
      responses:
        '200':
          description: OK
  /v0/capture:
    post:
      operationId: capture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureRequest'
      responses:
        '200':
          description: Created request
  /v0/source-signals:
    post:
      operationId: ingestSourceSignal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourceSignalRequest'
      responses:
        '200':
          description: Source signal ingested or merged into an active request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceSignalResponse'
  /v0/today:
    get:
      operationId: today
      responses:
        '200':
          description: User-facing Today snapshot grouped by attention needs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodaySnapshot'
  /v0/debug/today-internal:
    get:
      operationId: todayInternalDebug
      description: Optional debug route. SwiftUI must not use this route.
      responses:
        '200':
          description: Internal lifecycle-bucket snapshot.
  /v0/requests/{id}:
    get:
      operationId: getRequest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request detail
  /v0/actions/{id}/approve:
    post:
      operationId: approveAction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approval created
  /v0/actions/{id}/edit-and-approve:
    post:
      operationId: editAndApproveAction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        '200':
          description: Edited approval created
  /v0/actions/{id}/reject:
    post:
      operationId: rejectAction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rejected
  /v0/actions/{id}/execute-local:
    post:
      operationId: executeLocalAction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Executed local action
components:
  schemas:
    AttentionGroup:
      type: string
      enum:
        - needs_decision
        - needs_input
        - watching
        - handled
        - noise
    CaptureRequest:
      type: object
      required: [body]
      properties:
        title:
          type: string
        body:
          type: string
        url:
          type: string
        actor:
          type: string
    SourceSignalRequest:
      type: object
      required:
        - kind
        - actor
        - title
        - body
        - occurred_at
      properties:
        kind:
          type: string
          enum: [manual, feishu_chat, feishu_project, gitlab, feishu_docs]
        external_id:
          type:
            - string
            - 'null'
        actor:
          type: string
        title:
          type: string
        body:
          type: string
        url:
          type:
            - string
            - 'null'
        occurred_at:
          type: string
        raw_json:
          oneOf:
            - type: string
            - type: object
            - type: 'null'
    SourceSignalResponse:
      type: object
      required:
        - request
        - merged
        - detail_url
      properties:
        request:
          $ref: '#/components/schemas/RequestRef'
        merged:
          type: boolean
        detail_url:
          type: string
    RequestRef:
      type: object
      required:
        - id
      properties:
        id:
          type: string
    WorkRequest:
      type: object
      required:
        - id
        - title
        - summary
        - status
        - priority
        - risk
        - source_kind
        - source_signal_id
        - reason
        - next_step
        - created_at
        - updated_at
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        status:
          type: string
        priority:
          type: string
        risk:
          type: string
        source_kind:
          type: string
        source_signal_id:
          type: string
        reason:
          type: string
        next_step:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    TodaySnapshot:
      type: object
      required:
        - needs_decision
        - needs_input
        - watching
        - handled
        - noise
      properties:
        needs_decision:
          type: array
          items:
            $ref: '#/components/schemas/DecisionCard'
        needs_input:
          type: array
          items:
            $ref: '#/components/schemas/DecisionCard'
        watching:
          type: array
          items:
            $ref: '#/components/schemas/DecisionCard'
        handled:
          type: array
          items:
            $ref: '#/components/schemas/DecisionCard'
        noise:
          $ref: '#/components/schemas/NoiseSummary'
    NoiseSummary:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
          minimum: 0
    DecisionCard:
      type: object
      required:
        - request_id
        - title
        - summary
        - group
        - source_kind
        - source_url
        - priority
        - risk
        - why_now
        - prepared_next_move
        - target_preview
        - evidence_count
        - updated_at
        - debug_status
      properties:
        request_id:
          type: string
        title:
          type: string
        summary:
          type: string
        group:
          $ref: '#/components/schemas/AttentionGroup'
        source_kind:
          type: string
        source_url:
          type:
            - string
            - 'null'
        priority:
          type: string
          enum: [low, normal, high, urgent]
        risk:
          type: string
          enum: [l0, l1, l2, l3, l4, l5]
        why_now:
          type: string
        prepared_next_move:
          type:
            - string
            - 'null'
        target_preview:
          type:
            - string
            - 'null'
        evidence_count:
          type: integer
          minimum: 0
        updated_at:
          type: string
        debug_status:
          type: string
